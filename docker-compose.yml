services:
  app:
    build: .
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      PORT: "8000"
      ANYTHINGLLM_BASE_URL: https://anythingllm-production-6381.up.railway.app
      ANYTHINGLLM_WORKSPACE_SLUG: marifetli-ai
      ANYTHINGLLM_CHAT_MODE: chat
      # ANYTHINGLLM_API_KEY: .env veya Railway Variables (asla repoya yazma)
