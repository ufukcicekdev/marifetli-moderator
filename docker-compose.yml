services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 15s
      retries: 20
      start_period: 45s

  # İlk açılışta seçilen modeli sunucuya indirir; bittikten sonra app başlar.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/ollama"]
    command: ["pull", "${OLLAMA_MODEL:-llama3}"]
    restart: "no"

  app:
    build: .
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      PORT: "8000"
      OLLAMA_HTTP_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully

volumes:
  ollama_data:
