services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  app:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      OLLAMA_HTTP_URL: http://ollama:11434
    depends_on:
      - ollama

volumes:
  ollama_data:
