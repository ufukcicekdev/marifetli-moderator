# Tek servis: Ollama + moderasyon API (imaj içinde ikisi birden).
services:
  app:
    build: .
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      PORT: "8000"
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
